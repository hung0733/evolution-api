services:
  api:
    container_name: evolution_api
    image: evoapicloud/evolution-api:latest
    restart: always
    environment:
      TZ=Asia/Hong_Kong
    depends_on:
      - redis
      - evolution-postgres
    ports:
      - "3001:8080"
    volumes:
      - /data/evolution/instances:/evolution/instances
    networks:
      - evolution-net
      - dokploy-network
    env_file:
      - .env
    expose:
      - "8080"

  frontend:
    container_name: evolution_frontend
    image: evoapicloud/evolution-manager:latest
    restart: always
    environment:
      TZ=Asia/Hong_Kong
    ports:
      - "3000:80"
    networks:
      - evolution-net

  redis:
    container_name: evolution_redis
    image: redis:latest
    restart: always
    environment:
      TZ=Asia/Hong_Kong
    command: >
      redis-server --port 6379 --appendonly yes
    volumes:
      - /data/evolution/redis:/data
    networks:
      evolution-net:
        aliases:
          - evolution-redis
      dokploy-network:
        aliases:
          - evolution-redis
    expose:
      - "6379"

  evolution-postgres:
    container_name: evolution_postgres
    image: postgres:15
    restart: always
    env_file:
      - .env
    command:
      - postgres
      - -c
      - max_connections=1000
      - -c
      - listen_addresses=*
    environment:
      - POSTGRES_DB=${POSTGRES_DATABASE}
      - POSTGRES_USER=${POSTGRES_USERNAME}
      - POSTGRES_PASSWORD=${POSTGRES_PASSWORD}
      - TZ=Asia/Hong_Kong
    volumes:
      - /data/evolution/postgres:/var/lib/postgresql/data
    networks:
      - evolution-net
      - dokploy-network
    expose:
      - "5432"

networks:
  evolution-net:
    name: evolution-net
    driver: bridge
  dokploy-network:
    external: true
    